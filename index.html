<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌠%3C/text%3E%3C/svg%3E">

<meta charset="UTF-8">
<title>MIB Explorer</title>
<style>
  .section { background: white; margin: 20px 0; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  .section-header { background: #1e3a5f; color: white; padding: 6px 12px; border-radius: 8px 8px 0 0; font-weight: bold; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: center; font-size: 13px; }
  th { background: #f0f2f5; font-weight: bold; }
  .nok { background-color: #f9d6d6; }
  .yellow { background-color: #fff3cd; }
  .red { background-color: #f8d7da; }
  .white { background-color: #f0f2f5; }
  .green { background-color: #d9f2e3; }

  button { background:#1e3a5f; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; margin-top:10px; }
  button:hover { background:#294b7a; }

  }

  #fileInput {

    background: #1e3a5f;

  }

  .notice-box {

  /* 🧲 드래그 앤 드롭 영역 스타일 */
  #dropZone {

    border: 2px dashed #1e3a5f;

  #dropZone.dragover {

  }

  /* ================= 4단 컴팩트 레이아웃 (한 줄) ================= */
  .layout-row {
    display: flex;
    align-items: stretch;
    gap: 12px;
    margin: 12px 0;
  }
  .layout-row > .section { flex: 1 1 0; margin: 0; min-width: 0; }
  .layout-row > .section.upload-col { flex: 0 0 10%; min-width: 108px; }
  .compact-panel .section-header { padding: 5px 10px; font-size: 12.5px; }
  .compact-panel .section-header.with-action span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .upload-panel-body {
    display: flex;
    flex-direction: column;
    align-items: stretch;

    padding: 10px;
  }
  .upload-panel-body #fileInput { margin: 0; max-width: 100%; font-size: 11px; }
  .upload-panel-body #dropZone { width: 100%; box-sizing: border-box; padding: 6px 4px; font-size: 11px; }
  .upload-panel-body #exportBtn { margin: 0; padding: 6px 8px; font-size: 11px; width: 100%; box-sizing: border-box; }
  .upload-panel-body #uploadRepoBtn { margin: 0; padding: 6px 8px; font-size: 11px; width: 100%; box-sizing: border-box; }

  .reset-token-btn {

    border: 1px solid #cbd5e1;

  }

  /* ================= MIB Explorer 전용 스타일 ================= */

  .stat-row td { font-size: 13px; }
  .stat-row .stat-num { font-size: 20px; font-weight: bold; color: #1e3a5f; display:block; }
  .stat-row .stat-label { font-size: 11px; color: #6b7280; }

  .toolbar-inner {

    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 14px 16px;

  .toolbar-inner input[type="text"] {
    flex: 1 1 240px;
    padding: 8px 10px;

    border-radius: 8px;

  .file-log {

  #tableWrap table th { position: sticky; top: 0; z-index: 1; cursor: pointer; user-select: none; }

    display: block;
    font-size: 10px;
    font-weight: 400;

    margin-top: 2px;

  .oid .tail { color: #2563eb; font-weight: 700; }
  .oid.unresolved { color: #9ca3af; font-style: italic; }
  .oid-raw { display: block; font-size: 10.5px; color: #9ca3af; margin-top: 2px; }

  .access-read-write, .access-read-create { background: #fff3cd; color: #92620a; }
  .access-not-accessible, .access-noaccess, .access-accessible-for-notify { background: #f0f2f5; color: #6b7280; }
  .status-current { background: #d9f2e3; color: #166534; }

  td.desc-cell { max-width: 320px; text-align: left; font-size: 12.5px; color: #374151; }
  td.desc-cell .desc-text { display: block; max-height: 2.9em; overflow: hidden; cursor: pointer; }

  td.desc-cell .toggle { color: #2563eb; font-size: 11px; cursor: pointer; }

  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: #9ca3af;
    font-size: 13px;
  }

  /* ================= 저장소 MIB 파일 목록 ================= */
  .section-header.with-action {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .repo-refresh-btn {

    border: none;
    color: white;

    font-size: 13px;

  .repo-header-actions { display: flex; align-items: center; gap: 6px; flex: 0 0 auto; }

  .header-summary {

    font-size: 12px;

  .repo-file-list {

  .repo-file-item {
    display: flex;
    align-items: center;

    padding: 7px 8px;

    font-size: 12px;

  .repo-file-item.active .repo-file-size { color: #cfd9e8; }
  .repo-file-name { flex: 1 1 auto; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .repo-file-size { flex: 0 0 auto; color: #9ca3af; font-size: 11px; white-space: nowrap; }

  .repo-device-badge, .device-badge {
    flex: 0 0 auto;
    font-size: 10px;

    border-radius: 10px;

    color: white;
    background: #6b7280;
  }
  .repo-version-badge {
    flex: 0 0 auto;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    white-space: nowrap;
    color: #1e3a5f;
    background: #e5e9f0;
  }
  .repo-file-item.active .repo-version-badge { background: rgba(255,255,255,0.25); color: white; }
  .device-mc { background: #1d4ed8; }
  .device-sg { background: #0f9d58; }
  .repo-file-item.active .repo-device-badge { filter: brightness(1.15); }

  .repo-download-btn {
    flex: 0 0 auto;
    background: transparent;
    border: 1px solid #cbd5e1;
    color: #1e3a5f;
    width: 22px;
    height: 22px;

    padding: 0;
    margin: 0;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .repo-download-btn:hover { background: #1e3a5f; color: white; }
  .repo-file-item.active .repo-download-btn { border-color: rgba(255,255,255,0.5); color: white; }
  .repo-file-item.active .repo-download-btn:hover { background: rgba(255,255,255,0.2); }

  /* ================= 즐겨찾기 ================= */
  th.fav-col, td.fav-cell { width: 34px; text-align: center; padding: 6px 4px; }
  .fav-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0;
    margin: 0;
    color: #cbd5e1;
  }
  .fav-btn.active { color: #f5a623; }
  .fav-btn:hover { color: #f5a623; }

  .fav-only-label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12.5px;
    color: #374151;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  .fav-only-label input { cursor: pointer; }

  #favTableWrap { overflow-x: auto; max-height: 300px; overflow-y: auto; }
  #favTableWrap table th { position: sticky; top: 0; z-index: 1; }
  .fav-remove-btn {
    background: transparent;
    border: 1px solid #cbd5e1;
    color: #9ca3af;
    width: 20px;
    height: 20px;
    line-height: 1;
    padding: 0;
    border-radius: 5px;
    font-size: 11px;
    cursor: pointer;
  }
  .fav-remove-btn:hover { background: #f8d7da; color: #7a1f2b; border-color: #f8d7da; }

  .fav-action-btn {
    background: transparent;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 12px;
    padding: 2px 8px;
    margin: 0;
    border-radius: 6px;

  }
  .fav-action-btn:hover { background: rgba(255,255,255,0.15); }
  .fav-action-bar { display: flex; gap: 4px; align-items: center; }

</style>

<body>

<!-- 공통 헤더 + 제목 + 버전 -->
<script>
  window.pageTitle = "MIB Explorer";

<script src="https://etech-symantec.github.io/header.js"></script>

<!-- 상단 1행: 수동 업로드(10%) / 저장소 목록 / 압축파일 내부 정보 -->
<div class="layout-row">
  <div class="section compact-panel upload-col">
    <div class="section-header">📂 업로드</div>
    <div class="upload-panel-body">
      <input type="file" id="fileInput" accept=".zip">
      <div id="dropZone">⬆️ zip 드래그</div>
      <button id="exportBtn" disabled>💾 CSV</button>
      <button id="uploadRepoBtn" disabled title="이 파일을 저장소(/files)에 업로드">📤 저장소 업로드</button>
      <button id="resetTokenBtn" class="reset-token-btn" title="저장된 GitHub 토큰 재설정">🔑 토큰 재설정</button>
    </div>
  </div>

  <div class="section compact-panel">
    <div class="section-header with-action">
      <span>📦 저장소 MIB 목록 (/files)</span>
      <span class="repo-header-actions">
        <select id="repoDeviceFilter" class="repo-device-filter hidden" title="장비별 필터">
          <option value="">전체 장비</option>
        </select>
        <button id="repoRefreshBtn" class="repo-refresh-btn" title="목록 새로고침">🔄</button>
      </span>
    </div>
    <div id="repoFileList" class="repo-file-list">
      <div class="empty-state">불러오는 중...</div>
    </div>

  <div class="section compact-panel">
    <div class="section-header">🗂️ 압축파일 내부 정보</div>

    </div>

</div>

<div id="fileMeta"></div>

<!-- ✅ 안내 문구 -->
<div id="notice" class="notice">
  <div class="notice-box">
    <span class="notice-icon">🔒</span>
    <div class="notice-text">
      이 페이지는 <b>로컬 환경</b>에서만 작동하며, 파일이 외부 서버로 전송되지 않습니다.<br>
      압축을 풀고 MIB 파일을 파싱하는 모든 처리는 <b>브라우저 내부 스크립트</b>에서만 수행됩니다.
    </div>
  </div>
</div>

<div id="favoritesSection"></div>

<div id="report"></div>


<script>
(function(){
  "use strict";

  // ---------- well-known SNMP OID roots ----------
  const ROOTS = {
    'iso': '1',
    'ccitt': '0',
    'joint-iso-ccitt': '2',
    'org': '1.3',
    'dod': '1.3.6',
    'internet': '1.3.6.1',
    'directory': '1.3.6.1.1',
    'mgmt': '1.3.6.1.2',
    'mib-2': '1.3.6.1.2.1',
    'mib-II': '1.3.6.1.2.1',
    'transmission': '1.3.6.1.2.1.10',
    'experimental': '1.3.6.1.3',
    'private': '1.3.6.1.4',
    'enterprises': '1.3.6.1.4.1',
    'security': '1.3.6.1.5',
    'snmpV2': '1.3.6.1.6',
    'snmpDomains': '1.3.6.1.6.1',
    'snmpProxys': '1.3.6.1.6.2',
    'snmpModules': '1.3.6.1.6.3'
  };

  let allEntries = [];
  let filtered = [];
  let sortState = { key: null, dir: 1 };

  // ---------- 즐겨찾기 (localStorage에 영구 저장) ----------
  const FAV_STORAGE_KEY = 'mibExplorerFavorites';
  let favorites = new Map(); // favKey -> 저장된 항목 스냅샷

  function favKey(e){
    return [e.moduleName || '', e.name, e.oidResolved || e.oidRaw || ''].join('||');
  }

  function loadFavorites(){
    try{
      const raw = localStorage.getItem(FAV_STORAGE_KEY);
      if (!raw) return;
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)){
        arr.forEach(item => { if (item && item.key) favorites.set(item.key, item); });
      }
    }catch(err){ /* 손상된 데이터는 무시 */ }
  }

  function persistFavorites(){
    try{
      localStorage.setItem(FAV_STORAGE_KEY, JSON.stringify([...favorites.values()]));
    }catch(err){ /* 저장 공간 부족 등은 무시 */ }
  }

  function isFavorite(e){
    return favorites.has(favKey(e));
  }

  function toggleFavorite(e){
    const key = favKey(e);
    if (favorites.has(key)){
      favorites.delete(key);
    } else {
      favorites.set(key, {
        key,
        name: e.name,
        moduleName: e.moduleName,
        fileName: e.fileName,
        kind: e.kind,
        device: e.device || '',
        oidResolved: e.oidResolved || '',
        oidRaw: e.oidRaw || '',
        syntax: e.syntax || '',
        access: e.access || '',
        status: e.status || '',
        description: e.description || ''
      });
    }
    persistFavorites();
    renderFavoritesSection();
    if (document.getElementById('tbody')) renderTable();
  }

  function formatOidDot(str){
    if (!str) return '';
    return str.startsWith('.') ? str : '.' + str;
  }

  // 현재 불러온(선택된) MIB의 OID 값 집합
  function currentOidSet(){
    const set = new Set();
    allEntries.forEach(e => {
      const oid = e.oidResolved || e.oidRaw;
      if (oid) set.add(oid);
    });
    return set;
  }

  function renderFavoritesSection(){
    const favSection = document.getElementById('favoritesSection');
    const allFavs = [...favorites.values()].sort((a,b) => a.name.localeCompare(b.name));

    if (allFavs.length === 0){
      favSection.innerHTML = '';
      return;
    }

    const hasMib = allEntries.length > 0;
    const oidSet = currentOidSet();
    // 현재 선택된(불러온) MIB에 동일한 OID가 있는 즐겨찾기만 표시
    const list = hasMib ? allFavs.filter(item => oidSet.has(item.oidResolved || item.oidRaw)) : [];

    // 보여줄 항목이 없으면(즐겨찾기가 없거나, 현재 MIB과 일치하는 게 없으면) 카드 자체를 숨김
    if (list.length === 0){
      favSection.innerHTML = '';
      return;
    }

    favSection.innerHTML = `
      <div class="section">
        <div class="section-header with-action">
          <span>⭐ 즐겨찾기 OID 모음 (${list.length}/${allFavs.length})</span>
          <span class="fav-action-bar">
            <button type="button" class="fav-action-btn" id="favCopyBtn">📋 OID 전체 복사</button>
            <button type="button" class="fav-action-btn" id="favExportBtn">💾 CSV</button>
            <button type="button" class="fav-action-btn" id="favClearBtn">🗑 전체 삭제</button>
            <span id="favCopyStatus"></span>
          </span>
        </div>
        <div id="favTableWrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>OID</th>
                <th>File / Module</th>
                <th>Syntax</th>
                <th></th>
              </tr>
            </thead>

  // ---------- MIB text parsing ----------
  function parseMib(text, fileName){
    text = text.replace(/--.*$/gm, '');
    text = text.replace(/IMPORTS[\s\S]*?;/, '');

    const moduleMatch = text.match(/([A-Za-z][\w-]*)\s+DEFINITIONS\s*::=\s*BEGIN/);
    const moduleName = moduleMatch ? moduleMatch[1] : fileName.replace(/\.[^.]+$/, '');

    const objRegex = /([A-Za-z][\w-]*)\s+(OBJECT-TYPE|OBJECT IDENTIFIER|MODULE-IDENTITY|NOTIFICATION-TYPE|TRAP-TYPE)\b([\s\S]*?)::=\s*(?:\{([^}]*)\}|(\d+))/g;

    const entries = [];
    let m;
    while ((m = objRegex.exec(text)) !== null){
      const name = m[1];
      const kind = m[2];
      const block = m[3];
      let oidTokens;
      if (m[4] !== undefined){
        oidTokens = m[4].trim().split(/\s+/).filter(Boolean);
      } else if (m[5] !== undefined && kind === 'TRAP-TYPE'){
        const entMatch = block.match(/ENTERPRISE\s+([\w-]+)/);
        oidTokens = entMatch ? [entMatch[1], m[5]] : null;
      } else {
        oidTokens = null;
      }
      if (!oidTokens || oidTokens.length === 0) continue;

      const syntaxMatch = block.match(/SYNTAX\s+([\s\S]*?)(?=\n\s*(?:MAX-ACCESS|ACCESS|UNITS|STATUS|DESCRIPTION)\b|$)/);
      const accessMatch = block.match(/(?:MAX-ACCESS|ACCESS)\s+([\w-]+)/);
      const statusMatch = block.match(/STATUS\s+([\w-]+)/);
      const descMatch = block.match(/DESCRIPTION\s+"([\s\S]*?)"/);

      entries.push({
        fileName,
        moduleName,
        name,
        kind,
        oidParent: oidTokens[0],
        oidSubIds: oidTokens.slice(1),
        syntax: syntaxMatch ? syntaxMatch[1].replace(/\s+/g,' ').trim() : '',
        access: accessMatch ? accessMatch[1].toLowerCase() : '',
        status: statusMatch ? statusMatch[1].toLowerCase() : '',
        description: descMatch ? descMatch[1].replace(/\s+/g,' ').trim() : '',
        oidRaw: oidTokens.join(' ')
      });
    }
    return { moduleName, entries };
  }

  // ---------- OID resolution across the whole loaded set ----------
  function resolveAll(entries){
    const defsMap = new Map();
    entries.forEach(e => { if(!defsMap.has(e.name)) defsMap.set(e.name, e); });
    const memo = new Map();

    function resolve(name, guard){
      guard = guard || new Set();
      if (ROOTS[name]) return ROOTS[name];
      if (memo.has(name)) return memo.get(name);
      if (guard.has(name)) return null;
      const def = defsMap.get(name);
      if (!def) return null;
      guard.add(name);
      const parentOid = resolve(def.oidParent, guard);
      if (!parentOid) return null;
      const full = parentOid + '.' + def.oidSubIds.join('.');
      memo.set(name, full);
      return full;
    }

    entries.forEach(e => {
      if (/^\d+$/.test(e.oidParent)){
        e.oidResolved = [e.oidParent, ...e.oidSubIds].join('.');
      } else {
        e.oidResolved = resolve(e.name) || null;
      }
    });
  }

  // ---------- DOM refs ----------
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileMeta = document.getElementById('fileMeta');
  const fileLog = document.getElementById('fileLog');
  const exportBtn = document.getElementById('exportBtn');
  const uploadRepoBtn = document.getElementById('uploadRepoBtn');
  const resetTokenBtn = document.getElementById('resetTokenBtn');
  const report = document.getElementById('report');
  const repoFileList = document.getElementById('repoFileList');
  const repoRefreshBtn = document.getElementById('repoRefreshBtn');
  const repoDeviceFilter = document.getElementById('repoDeviceFilter');
  let repoZips = [];

  // 수동으로 업로드(선택/드래그)한 원본 zip 파일 — 저장소 업로드에 사용
  let currentZipFile = null;
  let currentZipSource = null; // 'manual' | 'repo'

  // GitHub Personal Access Token은 이 브라우저의 localStorage에만 저장되며,
  // 서버나 다른 사용자에게 전송/공유되지 않습니다.
  const GH_TOKEN_KEY = 'mibExplorerGithubToken';

  function ghHeaders(token){
    return { 'Accept': 'application/vnd.github+json', 'Authorization': `token ${token}` };
  }

  function arrayBufferToBase64(buffer){
    let binary = '';
    const bytes = new Uint8Array(buffer);
    const chunkSize = 0x8000;
    for (let i = 0; i < bytes.length; i += chunkSize){
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    }
    return btoa(binary);
  }

  // ⚙️ 이 페이지가 속한 GitHub Pages 저장소 정보.
  // GitHub Pages는 크게 두 패턴이 있습니다:
  //   1) 프로젝트 페이지: https://owner.github.io/REPO/... (리포 이름 = 첫 경로 세그먼트, 예: "mib")
  //   2) 사용자/조직 페이지: https://owner.github.io/... (리포 이름 = "owner.github.io")
  // 아래 resolveRepo()가 실제 API 호출로 어느 패턴인지 자동 판별합니다.
  const REPO_OWNER = location.hostname.split('.')[0] || '';
  const DEVICE_LABELS = { mc: 'Management Center', sg: 'Edge SWG' };

  function deviceInfo(fileName){
    const base = fileName.replace(/\.zip$/i, '');
    const m = base.match(/^mibs[_-]([a-z0-9]+)[_-](.+)$/i);
    if (!m) return null;
    const code = m[1].toLowerCase();
    // 버전 뒤에 붙는 "-숫자"(빌드 번호 등)는 무시하고 x.x.x.x 형태까지만 사용
    const version = (m[2] || '').replace(/-\d+$/, '');
    return { code, label: DEVICE_LABELS[code] || code.toUpperCase(), version };
  }

  let repoInfo = null; // { repo, dir } — 성공한 후보가 여기 캐시됨

  // 시도할 (repo, dir) 후보 목록을 순서대로 반환
  function repoCandidates(){
    const segments = location.pathname.split('/').filter(Boolean);
    const projectRepo = segments[0] || '';
    const projectDir = segments.slice(1, -1).concat('files').join('/') || 'files';
    const userPagesRepo = `${REPO_OWNER}.github.io`;
    const userPagesDir = segments.slice(0, -1).concat('files').join('/') || 'files';

    const list = [];
    if (projectRepo) list.push({ repo: projectRepo, dir: projectDir });
    list.push({ repo: userPagesRepo, dir: userPagesDir });
    return list;
  }

  // 후보들을 순서대로 실제 contents API에 시도해서 처음 성공하는 것을 사용
  async function fetchRepoContents(){
    if (repoInfo){
      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${repoInfo.repo}/contents/${repoInfo.dir}`, { headers: { 'Accept': 'application/vnd.github+json' } });
      return { res, repo: repoInfo.repo, dir: repoInfo.dir };
    }
    const candidates = repoCandidates();
    let lastRes = null, lastCandidate = null;
    for (const c of candidates){
      try{
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${c.repo}/contents/${c.dir}`, { headers: { 'Accept': 'application/vnd.github+json' } });
        lastRes = res; lastCandidate = c;
        if (res.ok){
          repoInfo = c;
          return { res, repo: c.repo, dir: c.dir };
        }
      }catch(e){ /* 다음 후보 시도 */ }
    }
    return { res: lastRes, repo: lastCandidate?.repo || '', dir: lastCandidate?.dir || '' };
  }

  function logLine(text, cls){
    const div = document.createElement('div');
    div.className = cls || '';
    div.textContent = text;
    fileLog.appendChild(div);
  }

  function escHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- drag & drop (동일 패턴) ----------
  ["dragenter", "dragover"].forEach(eventName => {
    dropZone.addEventListener(eventName, (e) => {
      e.preventDefault(); e.stopPropagation();
      dropZone.classList.add("dragover");
    });
  });
  ["dragleave", "drop"].forEach(eventName => {
    dropZone.addEventListener(eventName, (e) => {
      e.preventDefault(); e.stopPropagation();
      dropZone.classList.remove("dragover");
    });
  });
  dropZone.addEventListener("drop", (e) => {
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      fileInput.files = files;
      const event = new Event("change");
      fileInput.dispatchEvent(event);
    }
  });

  fileInput.addEventListener('change', function(e){
    const f = e.target.files[0];
    if (f) handleZipFile(f, 'manual');
  });

  async function handleZipFile(file, source){
    source = source || 'manual';
    currentZipFile = file;
    currentZipSource = source;

    document.getElementById("notice")?.remove();

    if (typeof JSZip === 'undefined'){
      fileMeta.textContent = 'JSZip 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.';
      fileMeta.style.color = '#b91c1c';
      return;
    }
    fileMeta.style.color = '#1e3a8a';
    fileMeta.textContent = `${file.name} (${(file.size/1024).toFixed(1)} KB) 압축 해제 중...`;
    fileLog.innerHTML = '';
    exportBtn.disabled = true;
    uploadRepoBtn.disabled = true;

    const zipDevice = deviceInfo(file.name);

    let zip;
    try{
      zip = await JSZip.loadAsync(file);
    }catch(err){
      fileMeta.textContent = '압축 파일을 열 수 없습니다: ' + err.message;
      fileMeta.style.color = '#b91c1c';
      return;
    }

    const entries = [];
    const names = Object.keys(zip.files).filter(n => !zip.files[n].dir);
    let parsedCount = 0, skippedCount = 0;

    for (const name of names){
      const base = name.split('/').pop();
      if (!base || base.startsWith('.')) continue;
      if (/\.(zip|png|jpg|jpeg|gif|pdf|doc|docx|xls|xlsx|exe|dll|so|bin)$/i.test(base)){
        skippedCount++;
        continue;
      }
      let text;
      try{
        text = await zip.files[name].async('string');
      }catch(err){
        skippedCount++;
        continue;
      }
      const looksLikeMib = /DEFINITIONS\s*::=\s*BEGIN/.test(text) || /OBJECT-TYPE/.test(text);
      if (!looksLikeMib){
        skippedCount++;
        logLine(`⊘ ${name} (MIB 형식 아님, 건너뜀)`, 'skip');
        continue;
      }
      const { entries: parsed } = parseMib(text, base);
      if (parsed.length === 0){
        skippedCount++;
        logLine(`⊘ ${name} (정의를 찾지 못함)`, 'skip');
        continue;
      }
      parsedCount++;
      logLine(`✓ ${name} — ${parsed.length}개 정의`, 'ok');
      parsed.forEach(e => { e.device = zipDevice ? zipDevice.label : ''; e.deviceCode = zipDevice ? zipDevice.code : ''; e.deviceVersion = zipDevice ? zipDevice.version : ''; });
      entries.push(...parsed);
    }

    if (entries.length === 0){
      fileMeta.textContent = `완료: 처리할 수 있는 MIB 정의를 찾지 못했습니다. (파일 ${names.length}개 중 ${skippedCount}개 건너뜀)`;
      fileMeta.style.color = '#92620a';
      return;
    }

    resolveAll(entries);
    allEntries = entries;
    fileMeta.textContent = `완료: 파일 ${parsedCount}개에서 정의 ${entries.length}개를 찾았습니다. (${skippedCount}개 건너뜀)`;
    fileMeta.style.color = '#166534';
    exportBtn.disabled = false;
    uploadRepoBtn.disabled = (source !== 'manual');

    buildReport();
    renderFavoritesSection();
  }

  // ---------- 저장소(/files) MIB zip 목록 ----------
  async function loadRepoFileList(){
    if (!REPO_OWNER){
      repoFileList.innerHTML = `<div class="empty-state">저장소 정보를 확인할 수 없습니다.</div>`;
      repoZips = [];
      populateRepoDeviceFilter(repoZips);
      return;
    }
    repoFileList.innerHTML = `<div class="empty-state">불러오는 중...</div>`;
    try{
      const { res, repo, dir } = await fetchRepoContents();
      if (!res || !res.ok){
        if (res && res.status === 404){
          repoFileList.innerHTML = `<div class="empty-state">'${escHtml(repo)}/${escHtml(dir)}' 폴더를 찾을 수 없습니다. 저장소에 해당 폴더와 MIB zip 파일을 올리면 여기에 표시됩니다.</div>`;
        } else {
          repoFileList.innerHTML = `<div class="empty-state">목록을 불러오지 못했습니다.${res ? ` (HTTP ${res.status})` : ''}</div>`;
        }
        repoZips = [];
        populateRepoDeviceFilter(repoZips);
        return;
      }
      const data = await res.json();
      const zips = (Array.isArray(data) ? data : []).filter(it => it.type === 'file' && /\.zip$/i.test(it.name));
      if (zips.length === 0){
        repoFileList.innerHTML = `<div class="empty-state">'${escHtml(repo)}/${escHtml(dir)}' 폴더에 등록된 MIB 압축 파일이 없습니다.</div>`;
        repoZips = [];
        populateRepoDeviceFilter(repoZips);
        return;
      }
      zips.sort((a,b) => a.name.localeCompare(b.name));
      repoZips = zips;
      populateRepoDeviceFilter(repoZips);
      renderRepoFileList();
    }catch(err){
      repoFileList.innerHTML = `<div class="empty-state">목록을 불러오는 중 오류가 발생했습니다: ${escHtml(err.message)}</div>`;
    }
  }

  // 저장소 zip 목록에서 발견되는 장비 코드/이름 목록 (중복 제거)
  function repoDeviceOptions(zips){
    const map = new Map();
    zips.forEach(it => {
      const d = deviceInfo(it.name);
      if (d) map.set(d.code, d.label);
    });
    return [...map.entries()].sort((a,b) => a[1].localeCompare(b[1]));
  }

  // 장비 필터 select의 옵션 목록을 최신 zip 목록 기준으로 채움
  function populateRepoDeviceFilter(zips){
    if (!repoDeviceFilter) return;
    const current = repoDeviceFilter.value;
    const opts = repoDeviceOptions(zips);
    const hasUnknown = zips.some(it => !deviceInfo(it.name));
    const shouldShow = (opts.length + (hasUnknown ? 1 : 0)) > 1;

    repoDeviceFilter.innerHTML = '<option value="">전체 장비</option>'
      + opts.map(([code, label]) => `<option value="${escHtml(code)}">${escHtml(label)}</option>`).join('')
      + (hasUnknown ? '<option value="__none__">기타 (장비 미상)</option>' : '');

    repoDeviceFilter.classList.toggle('hidden', !shouldShow);

    if ([...repoDeviceFilter.options].some(o => o.value === current)){
      repoDeviceFilter.value = current;
    } else {
      repoDeviceFilter.value = '';
    }
  }

  // 현재 선택된 장비 필터를 반영하여 저장소 목록을 렌더링
  function renderRepoFileList(){
    const filterVal = repoDeviceFilter ? repoDeviceFilter.value : '';
    let list = repoZips;
    if (filterVal){
      list = repoZips.filter(it => {
        const d = deviceInfo(it.name);
        return filterVal === '__none__' ? !d : (d && d.code === filterVal);
      });
    }

    if (list.length === 0){
      repoFileList.innerHTML = `<div class="empty-state">선택한 장비에 해당하는 MIB 파일이 없습니다.</div>`;
      return;
    }

    repoFileList.innerHTML = list.map(it => {
      const dev = deviceInfo(it.name);
      const badge = dev ? `<span class="repo-device-badge device-${escHtml(dev.code)}">${escHtml(dev.label)}</span>` : '';
      const versionBadge = dev && dev.version ? `<span class="repo-version-badge">v${escHtml(dev.version)}</span>` : '';
      return `
      <div class="repo-file-item" data-url="${escHtml(it.download_url)}" data-name="${escHtml(it.name)}">
        <span class="repo-file-name">📄 ${escHtml(it.name)}</span>
        ${badge}${versionBadge}
        <span class="repo-file-size">${(it.size/1024).toFixed(1)} KB</span>
        <button type="button" class="repo-download-btn" data-url="${escHtml(it.download_url)}" data-name="${escHtml(it.name)}" title="다운로드">⬇</button>
      </div>
    `;
    }).join('');
    repoFileList.querySelectorAll('.repo-file-item').forEach(el => {
      el.addEventListener('click', () => loadRepoFile(el));
    });
    repoFileList.querySelectorAll('.repo-download-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        downloadRepoFile(btn.getAttribute('data-url'), btn.getAttribute('data-name'), btn);
      });
    });
  }

  async function downloadRepoFile(url, name, btn){
    const original = btn.textContent;
    btn.textContent = '⏳';
    btn.disabled = true;
    try{
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const blob = await res.blob();
      const objectUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = objectUrl;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(objectUrl);
    }catch(err){
      fileMeta.textContent = `${name} 다운로드 실패: ${err.message}`;
      fileMeta.style.color = '#b91c1c';
    }finally{
      btn.textContent = original;
      btn.disabled = false;
    }
  }

  async function loadRepoFile(el){
    repoFileList.querySelectorAll('.repo-file-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    const url = el.getAttribute('data-url');
    const name = el.getAttribute('data-name');
    document.getElementById("notice")?.remove();
    fileMeta.style.color = '#1e3a8a';
    fileMeta.textContent = `${name} 다운로드 중...`;
    try{
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const blob = await res.blob();
      const file = new File([blob], name, { type: 'application/zip' });
      await handleZipFile(file, 'repo');
    }catch(err){
      fileMeta.textContent = `${name}을(를) 불러오지 못했습니다: ${err.message}`;
      fileMeta.style.color = '#b91c1c';
    }
  }

  // ---------- 수동 업로드 파일을 저장소(/files)에 자동 업로드 ----------
  async function uploadCurrentFileToRepo(){
    if (!currentZipFile || currentZipSource !== 'manual'){
      alert('업로드할 파일이 없습니다. zip 파일을 먼저 선택하거나 드래그해주세요.');
      return;
    }
    if (!REPO_OWNER){
      alert('저장소 정보를 확인할 수 없습니다.');
      return;
    }

    // 저장소/경로 정보가 아직 없으면 한번 확인 시도
    if (!repoInfo){
      await fetchRepoContents();
      if (!repoInfo){
        alert('저장소(/files) 위치를 확인할 수 없습니다. 저장소 목록을 새로고침한 뒤 다시 시도해주세요.');
        return;
      }
    }

    let token = localStorage.getItem(GH_TOKEN_KEY);
    if (!token){
      token = window.prompt('GitHub Personal Access Token을 입력하세요 (해당 저장소에 대한 쓰기 권한 필요).\n이 토큰은 이 브라우저에만 저장되며, 서버나 다른 사용자에게 전송/공유되지 않습니다.');
      if (!token) return;
      token = token.trim();
      if (!token) return;
      localStorage.setItem(GH_TOKEN_KEY, token);
    }

    const file = currentZipFile;
    const path = `${repoInfo.dir}/${file.name}`;
    if (!confirm(`'${file.name}' 파일을 저장소(${repoInfo.repo}/${repoInfo.dir})에 업로드할까요?\n동일한 이름의 파일이 있으면 덮어씁니다.`)) return;

    const original = uploadRepoBtn.textContent;
    uploadRepoBtn.disabled = true;
    uploadRepoBtn.textContent = '⏳ 업로드 중...';

    try{
      const encodedPath = path.split('/').map(encodeURIComponent).join('/');
      const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${repoInfo.repo}/contents/${encodedPath}`;

      // 이미 존재하는 파일이면 sha가 있어야 덮어쓰기가 가능함
      let sha;
      try{
        const existing = await fetch(apiUrl, { headers: ghHeaders(token) });
        if (existing.ok){
          const info = await existing.json();
          sha = info.sha;
        }
      }catch(e){ /* 없으면 새로 생성 */ }

      const arrayBuffer = await file.arrayBuffer();
      const base64 = arrayBufferToBase64(arrayBuffer);

      const res = await fetch(apiUrl, {
        method: 'PUT',
        headers: { ...ghHeaders(token), 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: `Upload ${file.name} via MIB Explorer`,
          content: base64,
          ...(sha ? { sha } : {})
        })
      });

      if (!res.ok){
        const errData = await res.json().catch(() => ({}));
        if (res.status === 401){
          localStorage.removeItem(GH_TOKEN_KEY);
          throw new Error('인증 실패: 토큰이 유효하지 않습니다. 토큰을 다시 입력해주세요.');
        }
        throw new Error(errData.message || `HTTP ${res.status}`);
      }

      fileMeta.textContent = `${file.name} 을(를) 저장소(${repoInfo.repo}/${repoInfo.dir})에 업로드했습니다.`;
      fileMeta.style.color = '#166534';
      loadRepoFileList();
    }catch(err){
      alert('저장소 업로드 실패: ' + err.message);
    }finally{
      uploadRepoBtn.textContent = original;
      uploadRepoBtn.disabled = (currentZipSource !== 'manual');
    }
  }

  uploadRepoBtn.addEventListener('click', uploadCurrentFileToRepo);
  resetTokenBtn.addEventListener('click', () => {
    localStorage.removeItem(GH_TOKEN_KEY);
    alert('저장된 GitHub 토큰을 삭제했습니다. 다음 업로드 시 다시 입력하게 됩니다.');
  });

  repoRefreshBtn.addEventListener('click', loadRepoFileList);
  repoDeviceFilter?.addEventListener('change', renderRepoFileList);
  loadRepoFileList();

  function buildReport(){
    const files = [...new Set(allEntries.map(e => e.fileName))].sort();
    const modules = new Set(allEntries.map(e => e.moduleName));
    const devices = [...new Set(allEntries.map(e => e.device).filter(Boolean))].sort();

    const headerSummary = `
      <span class="header-summary">
        <span><b>${files.length}</b> files</span>
        <span><b>${modules.size}</b> modules</span>
        <span><b>${allEntries.length}</b> objects</span>
      </span>
    `;

    report.innerHTML = `
      <div class="section">
        <div class="section-header with-action">
          <span>② OID 정의 목록</span>
          ${headerSummary}
        </div>
        <div class="toolbar-inner">
          <input type="text" id="searchInput" placeholder="이름, OID, SYNTAX, DESCRIPTION 검색...">
          <select id="fileFilter"><option value="">모든 파일</option>${files.map(f=>`<option value="${escHtml(f)}">${escHtml(f)}</option>`).join('')}</select>
          ${devices.length ? `<select id="deviceFilter"><option value="">모든 장비</option>${devices.map(d=>`<option value="${escHtml(d)}">${escHtml(d)}</option>`).join('')}</select>` : ''}
          <select id="kindFilter">
            <option value="">모든 종류</option>
            <option value="OBJECT-TYPE">OBJECT-TYPE</option>
            <option value="OBJECT IDENTIFIER">OBJECT IDENTIFIER</option>
            <option value="MODULE-IDENTITY">MODULE-IDENTITY</option>
            <option value="NOTIFICATION-TYPE">NOTIFICATION-TYPE</option>
            <option value="TRAP-TYPE">TRAP-TYPE</option>
          </select>
          <label class="fav-only-label"><input type="checkbox" id="favOnlyFilter"> ⭐ 즐겨찾기만</label>
        </div>
        <div id="tableWrap">
          <table>
            <thead>
              <tr>
                <th class="fav-col"></th>
                ${devices.length ? '<th data-key="device">Device</th>' : ''}
                <th data-key="fileName">File</th>
                <th data-key="name">Name</th>
                <th data-key="oidResolved">OID</th>
                <th data-key="syntax">Syntax</th>
                <th data-key="access">Access</th>
                <th data-key="status">Status</th>
                <th data-key="description">Description</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    `;

    document.getElementById('searchInput').addEventListener('input', renderTable);
    document.getElementById('fileFilter').addEventListener('change', renderTable);
    document.getElementById('deviceFilter')?.addEventListener('change', renderTable);
    document.getElementById('kindFilter').addEventListener('change', renderTable);
    document.getElementById('favOnlyFilter').addEventListener('change', renderTable);
    document.querySelectorAll('#tableWrap thead th[data-key]').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.getAttribute('data-key');
        if (sortState.key === key){ sortState.dir *= -1; }
        else { sortState.key = key; sortState.dir = 1; }
        document.querySelectorAll('#tableWrap thead th .arrow').forEach(a => a.remove());
        const arrow = document.createElement('span');
        arrow.className = 'arrow';
        arrow.textContent = sortState.dir === 1 ? '▲' : '▼';
        th.appendChild(arrow);
        renderTable();
      });
    });

    renderTable();
  }

  function oidHtml(e){
    if (!e.oidResolved){
      return `<span class="oid unresolved">.${escHtml(e.oidParent)}.${e.oidSubIds.join('.')}<span class="oid-raw">(부모 OID 미확인)</span></span>`;
    }
    const parts = e.oidResolved.split('.');
    const tailCount = Math.min(2, e.oidSubIds.length || 1);
    const baseParts = parts.slice(0, parts.length - tailCount);
    const tailParts = parts.slice(parts.length - tailCount);
    const baseStr = '.' + (baseParts.length ? baseParts.join('.') + '.' : '');
    return `<span class="oid"><span class="base">${escHtml(baseStr)}</span><span class="tail">${escHtml(tailParts.join('.'))}</span></span>`;
  }

  function accessClass(a){ return a ? 'access-' + a.replace(/[^a-z-]/g,'') : ''; }
  function statusClass(s){ return s ? 'status-' + s.replace(/[^a-z-]/g,'') : ''; }

  function renderTable(){
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const fFile = document.getElementById('fileFilter').value;
    const fDevice = document.getElementById('deviceFilter')?.value || '';
    const fKind = document.getElementById('kindFilter').value;
    const favOnly = document.getElementById('favOnlyFilter')?.checked || false;
    const hasDeviceCol = !!document.getElementById('deviceFilter');

    filtered = allEntries.filter(e => {
      if (fFile && e.fileName !== fFile) return false;
      if (fDevice && e.device !== fDevice) return false;
      if (fKind && e.kind !== fKind) return false;
      if (favOnly && !isFavorite(e)) return false;
      if (q){
        const hay = (e.name + ' ' + e.syntax + ' ' + e.description + ' ' + (e.oidResolved||'') + ' ' + e.moduleName).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    if (sortState.key){
      filtered.sort((a,b) => {
        const av = (a[sortState.key]||'').toString().toLowerCase();
        const bv = (b[sortState.key]||'').toString().toLowerCase();
        if (av < bv) return -1*sortState.dir;
        if (av > bv) return 1*sortState.dir;
        return 0;
      });
    }

    const tbody = document.getElementById('tbody');
    if (filtered.length === 0){
      tbody.innerHTML = `<tr><td colspan="${hasDeviceCol ? 9 : 8}" class="empty-state">조건에 맞는 정의가 없습니다.</td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map((e, i) => `
      <tr>
        <td class="fav-cell"><button type="button" class="fav-btn ${isFavorite(e) ? 'active' : ''}" data-idx="${i}" title="즐겨찾기">${isFavorite(e) ? '★' : '☆'}</button></td>
        ${hasDeviceCol ? `<td>${e.device ? `<span class="device-badge device-${escHtml(e.deviceCode||'other')}">${escHtml(e.device)}</span>` : ''}</td>` : ''}
        <td class="file-cell">${escHtml(e.fileName)}</td>
        <td class="name-cell">${escHtml(e.name)}<span class="kind-tag">${escHtml(e.kind)}</span></td>
        <td class="oid-cell">${oidHtml(e)}</td>
        <td class="syntax-cell">${escHtml(e.syntax)}</td>
        <td>${e.access ? `<span class="access-badge ${accessClass(e.access)}">${escHtml(e.access)}</span>` : ''}</td>
        <td>${e.status ? `<span class="status-badge ${statusClass(e.status)}">${escHtml(e.status)}</span>` : ''}</td>
        <td class="desc-cell">
          <span class="desc-text" data-idx="${i}">${escHtml(e.description) || '—'}</span>
          ${e.description && e.description.length > 140 ? '<span class="toggle" data-idx="'+i+'">더 보기</span>' : ''}
        </td>
      </tr>
    `).join('');

    tbody.querySelectorAll('.toggle').forEach(el => {
      el.addEventListener('click', () => {
        const idx = el.getAttribute('data-idx');
        const span = tbody.querySelector(`.desc-text[data-idx="${idx}"]`);
        span.classList.toggle('expanded');
        el.textContent = span.classList.contains('expanded') ? '접기' : '더 보기';
      });
    });

    tbody.querySelectorAll('.fav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = Number(btn.getAttribute('data-idx'));
        toggleFavorite(filtered[idx]);
      });
    });
  }

  exportBtn.addEventListener('click', () => {
    if (filtered.length === 0) return;
    const cols = ['device','deviceVersion','fileName','moduleName','name','kind','oidResolved','oidRaw','syntax','access','status','description'];
    const header = ['Device','Version','File','Module','Name','Kind','OID','OID (raw)','Syntax','Access','Status','Description'];
    const rows = [header].concat(filtered.map(e => cols.map(c => {
      let v = e[c] == null ? '' : String(e[c]);
      if (c === 'oidResolved' && v) v = formatOidDot(v);
      v = v.replace(/"/g,'""');
      return `"${v}"`;
    })));
    const csv = '\uFEFF' + rows.map(r => r.join(',')).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mib-objects.csv';
    a.click();
    URL.revokeObjectURL(url);
  });

})();
</script>

</body>
</html>
