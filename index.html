<style>
  .section { background: white; margin: 20px 0; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  .section-header { background: #1e3a5f; color: white; padding: 6px 12px; border-radius: 8px 8px 0 0; font-weight: bold; }

  .red { background-color: #f8d7da; }

  .green { background-color: #d9f2e3; }
  input[type=file] { margin: 15px 0; }
  button { background:#1e3a5f; color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; margin-top:10px; }

    display: flex;
    align-items: center;
    background: linear-gradient(135deg, #e9eef8 0%, #f5f7fb 100%);

    border: 2px dashed #1e3a5f;

  /* ================= MIB Explorer 전용 스타일 ================= */

  .stat-row td { font-size: 13px; }
  .stat-row .stat-num { font-size: 20px; font-weight: bold; color: #1e3a5f; display:block; }
  .stat-row .stat-label { font-size: 11px; color: #6b7280; }

  .toolbar-inner {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 14px 16px;
  }
  .toolbar-inner input[type="text"] {
    flex: 1 1 240px;
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 13px;
    background: #fafafa;
  }
  .toolbar-inner input[type="text"]:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37,99,235,0.2);
    background: #fff;
  }
  .toolbar-inner select {
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 13px;
    background: #fff;
    color: #374151;
  }

  .file-log {
    margin-top: 10px;
    font-size: 11.5px;
    color: #6b7280;
    max-height: 90px;
    overflow-y: auto;
    text-align: left;
    padding: 0 4px;
  }
  .file-log div { padding: 1px 0; }
  .file-log .ok { color: #1e3a8a; }

    margin-top: 8px;

  #tableWrap { overflow-x: auto; max-height: 62vh; overflow-y: auto; }

  #tableWrap table th:hover { background: #e5e9f0; }

  td.name-cell { font-weight: 600; color: #1e3a5f; white-space: nowrap; text-align: left; }

  td.syntax-cell { text-align: left; font-size: 12px; max-width: 220px; }
  td.oid-cell { text-align: left; white-space: nowrap; font-size: 12.5px; }
  .oid .base { color: #9ca3af; }
  .oid .tail { color: #2563eb; font-weight: 700; }
  .oid.unresolved { color: #9ca3af; font-style: italic; }
  .oid-raw { display: block; font-size: 10.5px; color: #9ca3af; margin-top: 2px; }

  .access-badge, .status-badge {
    font-size: 11px;

  .access-read-only { background: #d9f2e3; color: #166534; }
  .access-read-write, .access-read-create { background: #fff3cd; color: #92620a; }
  .access-not-accessible, .access-noaccess, .access-accessible-for-notify { background: #f0f2f5; color: #6b7280; }
  .status-current { background: #d9f2e3; color: #166534; }
  .status-deprecated { background: #fff3cd; color: #92620a; }
  .status-obsolete, .status-mandatory { background: #f8d7da; color: #7a1f2b; }

  td.desc-cell { max-width: 320px; text-align: left; font-size: 12.5px; color: #374151; }
  td.desc-cell .desc-text { display: block; max-height: 2.9em; overflow: hidden; cursor: pointer; }
  td.desc-cell .desc-text.expanded { max-height: none; }
  td.desc-cell .toggle { color: #2563eb; font-size: 11px; cursor: pointer; }

  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: #9ca3af;
    font-size: 13px;
  }

  /* ================= 저장소 MIB 파일 목록 ================= */
  .section-header.with-action {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .repo-refresh-btn {

  .repo-file-item:hover { background: #eef2f9; }
  .repo-file-item.active { background: #1e3a5f; color: white; }
  .repo-file-item.active .repo-file-size { color: #cfd9e8; }
  .repo-file-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .repo-file-size { color: #9ca3af; font-size: 11.5px; white-space: nowrap; }

  .repo-device-badge, .device-badge {
    font-size: 10.5px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    white-space: nowrap;
    color: white;
    background: #6b7280;
  }
  .device-mc { background: #1d4ed8; }
  .device-sg { background: #0f9d58; }
  .repo-file-item.active .repo-device-badge { filter: brightness(1.15); }
</style>

<body>

<!-- 공통 헤더 + 제목 + 버전 -->
<script>

  window.pageVersion = "ver.2026.07.10.01";
</script>
<script src="https://etech-symantec.github.io/header.js"></script>

<!-- 📦 저장소(/files)에 등록된 MIB 목록 -->
<div class="section">
  <div class="section-header with-action">
    <span>📦 저장소에 등록된 MIB 파일 (/files)</span>
    <button id="repoRefreshBtn" class="repo-refresh-btn" title="목록 새로고침">🔄 새로고침</button>
  </div>
  <div id="repoFileList" class="repo-file-list">
    <div class="empty-state">불러오는 중...</div>
  </div>
</div>

<!-- 📂 파일 업로드 바 -->
<div class="button-bar">
  <input type="file" id="fileInput" accept=".zip">
  <div id="dropZone">⬆️ MIB 압축(zip) 파일을 여기에 드래그해서 놓으세요.</div>
  <button id="exportBtn" disabled>💾 CSV 내보내기</button>
</div>

<div id="fileMeta"></div>
<div class="file-log" id="fileLog"></div>

<!-- ✅ 안내 문구 -->
<div id="notice" class="notice">
  <div class="notice-box">
    <span class="notice-icon">🔒</span>
    <div class="notice-text">
      이 페이지는 <b>로컬 환경</b>에서만 작동하며, 파일이 외부 서버로 전송되지 않습니다.<br>
      압축을 풀고 MIB 파일을 파싱하는 모든 처리는 <b>브라우저 내부 스크립트</b>에서만 수행됩니다.
    </div>
  </div>
</div>

<div id="report"></div>

<script>
(function(){
  "use strict";

  // ---------- well-known SNMP OID roots ----------
  const ROOTS = {
    'iso': '1',
    'ccitt': '0',
    'joint-iso-ccitt': '2',
    'org': '1.3',
    'dod': '1.3.6',
    'internet': '1.3.6.1',
    'directory': '1.3.6.1.1',
    'mgmt': '1.3.6.1.2',
    'mib-2': '1.3.6.1.2.1',
    'mib-II': '1.3.6.1.2.1',
    'transmission': '1.3.6.1.2.1.10',
    'experimental': '1.3.6.1.3',
    'private': '1.3.6.1.4',
    'enterprises': '1.3.6.1.4.1',
    'security': '1.3.6.1.5',
    'snmpV2': '1.3.6.1.6',
    'snmpDomains': '1.3.6.1.6.1',
    'snmpProxys': '1.3.6.1.6.2',
    'snmpModules': '1.3.6.1.6.3'
  };

  let allEntries = [];
  let filtered = [];
  let sortState = { key: null, dir: 1 };

  // ---------- MIB text parsing ----------
  function parseMib(text, fileName){
    text = text.replace(/--.*$/gm, '');
    text = text.replace(/IMPORTS[\s\S]*?;/, '');

    const moduleMatch = text.match(/([A-Za-z][\w-]*)\s+DEFINITIONS\s*::=\s*BEGIN/);
    const moduleName = moduleMatch ? moduleMatch[1] : fileName.replace(/\.[^.]+$/, '');

    const objRegex = /([A-Za-z][\w-]*)\s+(OBJECT-TYPE|OBJECT IDENTIFIER|MODULE-IDENTITY|NOTIFICATION-TYPE|TRAP-TYPE)\b([\s\S]*?)::=\s*(?:\{([^}]*)\}|(\d+))/g;

    const entries = [];
    let m;
    while ((m = objRegex.exec(text)) !== null){
      const name = m[1];
      const kind = m[2];
      const block = m[3];
      let oidTokens;
      if (m[4] !== undefined){
        oidTokens = m[4].trim().split(/\s+/).filter(Boolean);
      } else if (m[5] !== undefined && kind === 'TRAP-TYPE'){
        const entMatch = block.match(/ENTERPRISE\s+([\w-]+)/);
        oidTokens = entMatch ? [entMatch[1], m[5]] : null;
      } else {
        oidTokens = null;
      }
      if (!oidTokens || oidTokens.length === 0) continue;

      const syntaxMatch = block.match(/SYNTAX\s+([\s\S]*?)(?=\n\s*(?:MAX-ACCESS|ACCESS|UNITS|STATUS|DESCRIPTION)\b|$)/);
      const accessMatch = block.match(/(?:MAX-ACCESS|ACCESS)\s+([\w-]+)/);
      const statusMatch = block.match(/STATUS\s+([\w-]+)/);
      const descMatch = block.match(/DESCRIPTION\s+"([\s\S]*?)"/);

      entries.push({
        fileName,
        moduleName,
        name,
        kind,
        oidParent: oidTokens[0],
        oidSubIds: oidTokens.slice(1),
        syntax: syntaxMatch ? syntaxMatch[1].replace(/\s+/g,' ').trim() : '',
        access: accessMatch ? accessMatch[1].toLowerCase() : '',
        status: statusMatch ? statusMatch[1].toLowerCase() : '',
        description: descMatch ? descMatch[1].replace(/\s+/g,' ').trim() : '',
        oidRaw: oidTokens.join(' ')
      });
    }
    return { moduleName, entries };
  }

  // ---------- OID resolution across the whole loaded set ----------
  function resolveAll(entries){
    const defsMap = new Map();
    entries.forEach(e => { if(!defsMap.has(e.name)) defsMap.set(e.name, e); });
    const memo = new Map();

    function resolve(name, guard){
      guard = guard || new Set();
      if (ROOTS[name]) return ROOTS[name];
      if (memo.has(name)) return memo.get(name);
      if (guard.has(name)) return null;
      const def = defsMap.get(name);
      if (!def) return null;
      guard.add(name);
      const parentOid = resolve(def.oidParent, guard);
      if (!parentOid) return null;
      const full = parentOid + '.' + def.oidSubIds.join('.');
      memo.set(name, full);
      return full;
    }

    entries.forEach(e => {
      if (/^\d+$/.test(e.oidParent)){
        e.oidResolved = [e.oidParent, ...e.oidSubIds].join('.');
      } else {
        e.oidResolved = resolve(e.name) || null;
      }
    });
  }

  // ---------- DOM refs ----------
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileMeta = document.getElementById('fileMeta');
  const fileLog = document.getElementById('fileLog');
  const exportBtn = document.getElementById('exportBtn');
  const report = document.getElementById('report');
  const repoFileList = document.getElementById('repoFileList');
  const repoRefreshBtn = document.getElementById('repoRefreshBtn');

  // ⚙️ 이 페이지가 속한 GitHub Pages 저장소 정보.
  // GitHub Pages는 크게 두 패턴이 있습니다:
  //   1) 프로젝트 페이지: https://owner.github.io/REPO/... (리포 이름 = 첫 경로 세그먼트, 예: "mib")
  //   2) 사용자/조직 페이지: https://owner.github.io/... (리포 이름 = "owner.github.io")
  // 아래 resolveRepo()가 실제 API 호출로 어느 패턴인지 자동 판별합니다.
  const REPO_OWNER = location.hostname.split('.')[0] || '';
  const DEVICE_LABELS = { mc: 'Management Center', sg: 'Edge SWG' };

  function deviceInfo(fileName){
    const m = fileName.match(/^mibs[_-]([a-z0-9]+)[_-]/i);
    if (!m) return null;
    const code = m[1].toLowerCase();
    return { code, label: DEVICE_LABELS[code] || code.toUpperCase() };
  }

  let repoInfo = null; // { repo, dir } — 성공한 후보가 여기 캐시됨

  // 시도할 (repo, dir) 후보 목록을 순서대로 반환
  function repoCandidates(){
    const segments = location.pathname.split('/').filter(Boolean);
    const projectRepo = segments[0] || '';
    const projectDir = segments.slice(1, -1).concat('files').join('/') || 'files';
    const userPagesRepo = `${REPO_OWNER}.github.io`;
    const userPagesDir = segments.slice(0, -1).concat('files').join('/') || 'files';

    const list = [];
    if (projectRepo) list.push({ repo: projectRepo, dir: projectDir });
    list.push({ repo: userPagesRepo, dir: userPagesDir });
    return list;
  }

  // 후보들을 순서대로 실제 contents API에 시도해서 처음 성공하는 것을 사용
  async function fetchRepoContents(){
    if (repoInfo){
      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${repoInfo.repo}/contents/${repoInfo.dir}`, { headers: { 'Accept': 'application/vnd.github+json' } });
      return { res, repo: repoInfo.repo, dir: repoInfo.dir };
    }
    const candidates = repoCandidates();
    let lastRes = null, lastCandidate = null;
    for (const c of candidates){
      try{
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${c.repo}/contents/${c.dir}`, { headers: { 'Accept': 'application/vnd.github+json' } });
        lastRes = res; lastCandidate = c;
        if (res.ok){
          repoInfo = c;
          return { res, repo: c.repo, dir: c.dir };
        }
      }catch(e){ /* 다음 후보 시도 */ }
    }
    return { res: lastRes, repo: lastCandidate?.repo || '', dir: lastCandidate?.dir || '' };
  }

  function logLine(text, cls){
    const div = document.createElement('div');
    div.className = cls || '';
    div.textContent = text;
    fileLog.appendChild(div);
  }

  function escHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- drag & drop (동일 패턴) ----------
  ["dragenter", "dragover"].forEach(eventName => {
    dropZone.addEventListener(eventName, (e) => {
      e.preventDefault(); e.stopPropagation();
      dropZone.classList.add("dragover");
    });
  });
  ["dragleave", "drop"].forEach(eventName => {
    dropZone.addEventListener(eventName, (e) => {
      e.preventDefault(); e.stopPropagation();
      dropZone.classList.remove("dragover");
    });
  });
  dropZone.addEventListener("drop", (e) => {
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      fileInput.files = files;
      const event = new Event("change");
      fileInput.dispatchEvent(event);
    }
  });

  fileInput.addEventListener('change', function(e){
    const f = e.target.files[0];
    if (f) handleZipFile(f);
  });

  async function handleZipFile(file){
    document.getElementById("notice")?.remove();

    if (typeof JSZip === 'undefined'){
      fileMeta.textContent = 'JSZip 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.';
      fileMeta.style.color = '#b91c1c';
      return;
    }
    fileMeta.style.color = '#1e3a8a';
    fileMeta.textContent = `${file.name} (${(file.size/1024).toFixed(1)} KB) 압축 해제 중...`;
    fileLog.innerHTML = '';
    exportBtn.disabled = true;

    const zipDevice = deviceInfo(file.name);

    let zip;
    try{
      zip = await JSZip.loadAsync(file);
    }catch(err){
      fileMeta.textContent = '압축 파일을 열 수 없습니다: ' + err.message;
      fileMeta.style.color = '#b91c1c';
      return;
    }

    const entries = [];
    const names = Object.keys(zip.files).filter(n => !zip.files[n].dir);
    let parsedCount = 0, skippedCount = 0;

    for (const name of names){
      const base = name.split('/').pop();
      if (!base || base.startsWith('.')) continue;
      if (/\.(zip|png|jpg|jpeg|gif|pdf|doc|docx|xls|xlsx|exe|dll|so|bin)$/i.test(base)){
        skippedCount++;
        continue;
      }
      let text;
      try{
        text = await zip.files[name].async('string');
      }catch(err){
        skippedCount++;
        continue;
      }
      const looksLikeMib = /DEFINITIONS\s*::=\s*BEGIN/.test(text) || /OBJECT-TYPE/.test(text);
      if (!looksLikeMib){
        skippedCount++;
        logLine(`⊘ ${name} (MIB 형식 아님, 건너뜀)`, 'skip');
        continue;
      }
      const { entries: parsed } = parseMib(text, base);
      if (parsed.length === 0){
        skippedCount++;
        logLine(`⊘ ${name} (정의를 찾지 못함)`, 'skip');
        continue;
      }
      parsedCount++;
      logLine(`✓ ${name} — ${parsed.length}개 정의`, 'ok');
      parsed.forEach(e => { e.device = zipDevice ? zipDevice.label : ''; e.deviceCode = zipDevice ? zipDevice.code : ''; });
      entries.push(...parsed);
    }

    if (entries.length === 0){
      fileMeta.textContent = `완료: 처리할 수 있는 MIB 정의를 찾지 못했습니다. (파일 ${names.length}개 중 ${skippedCount}개 건너뜀)`;
      fileMeta.style.color = '#92620a';
      return;
    }

    resolveAll(entries);
    allEntries = entries;
    fileMeta.textContent = `완료: 파일 ${parsedCount}개에서 정의 ${entries.length}개를 찾았습니다. (${skippedCount}개 건너뜀)`;
    fileMeta.style.color = '#166534';
    exportBtn.disabled = false;

    buildReport();
  }

  // ---------- 저장소(/files) MIB zip 목록 ----------
  async function loadRepoFileList(){
    if (!REPO_OWNER){
      repoFileList.innerHTML = `<div class="empty-state">저장소 정보를 확인할 수 없습니다.</div>`;
      return;
    }
    repoFileList.innerHTML = `<div class="empty-state">불러오는 중...</div>`;
    try{
      const { res, repo, dir } = await fetchRepoContents();
      if (!res || !res.ok){
        if (res && res.status === 404){
          repoFileList.innerHTML = `<div class="empty-state">'${escHtml(repo)}/${escHtml(dir)}' 폴더를 찾을 수 없습니다. 저장소에 해당 폴더와 MIB zip 파일을 올리면 여기에 표시됩니다.</div>`;
        } else {
          repoFileList.innerHTML = `<div class="empty-state">목록을 불러오지 못했습니다.${res ? ` (HTTP ${res.status})` : ''}</div>`;
        }
        return;
      }
      const data = await res.json();
      const zips = (Array.isArray(data) ? data : []).filter(it => it.type === 'file' && /\.zip$/i.test(it.name));
      if (zips.length === 0){
        repoFileList.innerHTML = `<div class="empty-state">'${escHtml(repo)}/${escHtml(dir)}' 폴더에 등록된 MIB 압축 파일이 없습니다.</div>`;
        return;
      }
      zips.sort((a,b) => a.name.localeCompare(b.name));
      repoFileList.innerHTML = zips.map(it => {
        const dev = deviceInfo(it.name);
        const badge = dev ? `<span class="repo-device-badge device-${escHtml(dev.code)}">${escHtml(dev.label)}</span>` : '';
        return `
        <div class="repo-file-item" data-url="${escHtml(it.download_url)}" data-name="${escHtml(it.name)}">
          <span class="repo-file-name">📄 ${escHtml(it.name)}</span>
          ${badge}
          <span class="repo-file-size">${(it.size/1024).toFixed(1)} KB</span>
        </div>
      `;
      }).join('');
      repoFileList.querySelectorAll('.repo-file-item').forEach(el => {
        el.addEventListener('click', () => loadRepoFile(el));
      });
    }catch(err){
      repoFileList.innerHTML = `<div class="empty-state">목록을 불러오는 중 오류가 발생했습니다: ${escHtml(err.message)}</div>`;
    }
  }

  async function loadRepoFile(el){
    repoFileList.querySelectorAll('.repo-file-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    const url = el.getAttribute('data-url');
    const name = el.getAttribute('data-name');
    document.getElementById("notice")?.remove();
    fileMeta.style.color = '#1e3a8a';
    fileMeta.textContent = `${name} 다운로드 중...`;
    try{
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const blob = await res.blob();
      const file = new File([blob], name, { type: 'application/zip' });
      await handleZipFile(file);
    }catch(err){
      fileMeta.textContent = `${name}을(를) 불러오지 못했습니다: ${err.message}`;
      fileMeta.style.color = '#b91c1c';
    }
  }

  repoRefreshBtn.addEventListener('click', loadRepoFileList);
  loadRepoFileList();

  function buildReport(){
    const files = [...new Set(allEntries.map(e => e.fileName))].sort();
    const modules = new Set(allEntries.map(e => e.moduleName));
    const devices = [...new Set(allEntries.map(e => e.device).filter(Boolean))].sort();

    report.innerHTML = `
      <div class="section">
        <div class="section-header">① 업로드 요약</div>
        <table>
          <tr><th>Files</th><th>Modules</th><th>Objects</th></tr>
          <tr class="stat-row">
            <td><span class="stat-num">${files.length}</span><span class="stat-label">files</span></td>
            <td><span class="stat-num">${modules.size}</span><span class="stat-label">modules</span></td>
            <td><span class="stat-num">${allEntries.length}</span><span class="stat-label">objects</span></td>
          </tr>
        </table>
      </div>

      <div class="section">
        <div class="section-header">② OID 정의 목록</div>
        <div class="toolbar-inner">
          <input type="text" id="searchInput" placeholder="이름, OID, SYNTAX, DESCRIPTION 검색...">
          <select id="fileFilter"><option value="">모든 파일</option>${files.map(f=>`<option value="${escHtml(f)}">${escHtml(f)}</option>`).join('')}</select>
          ${devices.length ? `<select id="deviceFilter"><option value="">모든 장비</option>${devices.map(d=>`<option value="${escHtml(d)}">${escHtml(d)}</option>`).join('')}</select>` : ''}
          <select id="kindFilter">
            <option value="">모든 종류</option>
            <option value="OBJECT-TYPE">OBJECT-TYPE</option>
            <option value="OBJECT IDENTIFIER">OBJECT IDENTIFIER</option>
            <option value="MODULE-IDENTITY">MODULE-IDENTITY</option>
            <option value="NOTIFICATION-TYPE">NOTIFICATION-TYPE</option>
            <option value="TRAP-TYPE">TRAP-TYPE</option>
          </select>
        </div>
        <div id="tableWrap">
          <table>
            <thead>
              <tr>
                ${devices.length ? '<th data-key="device">Device</th>' : ''}
                <th data-key="fileName">File</th>
                <th data-key="name">Name</th>
                <th data-key="oidResolved">OID</th>
                <th data-key="syntax">Syntax</th>
                <th data-key="access">Access</th>
                <th data-key="status">Status</th>
                <th data-key="description">Description</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    `;

    document.getElementById('searchInput').addEventListener('input', renderTable);
    document.getElementById('fileFilter').addEventListener('change', renderTable);
    document.getElementById('deviceFilter')?.addEventListener('change', renderTable);
    document.getElementById('kindFilter').addEventListener('change', renderTable);
    document.querySelectorAll('#tableWrap thead th[data-key]').forEach(th => {
      th.addEventListener('click', () => {
        const key = th.getAttribute('data-key');
        if (sortState.key === key){ sortState.dir *= -1; }
        else { sortState.key = key; sortState.dir = 1; }
        document.querySelectorAll('#tableWrap thead th .arrow').forEach(a => a.remove());
        const arrow = document.createElement('span');
        arrow.className = 'arrow';
        arrow.textContent = sortState.dir === 1 ? '▲' : '▼';
        th.appendChild(arrow);
        renderTable();
      });
    });

    renderTable();
  }

  function oidHtml(e){
    if (!e.oidResolved){
      return `<span class="oid unresolved">${escHtml(e.oidParent)}.${e.oidSubIds.join('.')}<span class="oid-raw">(부모 OID 미확인)</span></span>`;
    }
    const parts = e.oidResolved.split('.');
    const tailCount = Math.min(2, e.oidSubIds.length || 1);
    const baseParts = parts.slice(0, parts.length - tailCount);
    const tailParts = parts.slice(parts.length - tailCount);
    const baseStr = baseParts.length ? baseParts.join('.') + '.' : '';
    return `<span class="oid"><span class="base">${escHtml(baseStr)}</span><span class="tail">${escHtml(tailParts.join('.'))}</span></span>`;
  }

  function accessClass(a){ return a ? 'access-' + a.replace(/[^a-z-]/g,'') : ''; }
  function statusClass(s){ return s ? 'status-' + s.replace(/[^a-z-]/g,'') : ''; }

  function renderTable(){
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const fFile = document.getElementById('fileFilter').value;
    const fDevice = document.getElementById('deviceFilter')?.value || '';
    const fKind = document.getElementById('kindFilter').value;
    const hasDeviceCol = !!document.getElementById('deviceFilter');

    filtered = allEntries.filter(e => {
      if (fFile && e.fileName !== fFile) return false;
      if (fDevice && e.device !== fDevice) return false;
      if (fKind && e.kind !== fKind) return false;
      if (q){
        const hay = (e.name + ' ' + e.syntax + ' ' + e.description + ' ' + (e.oidResolved||'') + ' ' + e.moduleName).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    if (sortState.key){
      filtered.sort((a,b) => {
        const av = (a[sortState.key]||'').toString().toLowerCase();
        const bv = (b[sortState.key]||'').toString().toLowerCase();
        if (av < bv) return -1*sortState.dir;
        if (av > bv) return 1*sortState.dir;
        return 0;
      });
    }

    const tbody = document.getElementById('tbody');
    if (filtered.length === 0){
      tbody.innerHTML = `<tr><td colspan="${hasDeviceCol ? 8 : 7}" class="empty-state">조건에 맞는 정의가 없습니다.</td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map((e, i) => `
      <tr>
        ${hasDeviceCol ? `<td>${e.device ? `<span class="device-badge device-${escHtml(e.deviceCode||'other')}">${escHtml(e.device)}</span>` : ''}</td>` : ''}
        <td class="file-cell">${escHtml(e.fileName)}</td>
        <td class="name-cell">${escHtml(e.name)}<span class="kind-tag">${escHtml(e.kind)}</span></td>
        <td class="oid-cell">${oidHtml(e)}</td>
        <td class="syntax-cell">${escHtml(e.syntax)}</td>
        <td>${e.access ? `<span class="access-badge ${accessClass(e.access)}">${escHtml(e.access)}</span>` : ''}</td>
        <td>${e.status ? `<span class="status-badge ${statusClass(e.status)}">${escHtml(e.status)}</span>` : ''}</td>
        <td class="desc-cell">
          <span class="desc-text" data-idx="${i}">${escHtml(e.description) || '—'}</span>
          ${e.description && e.description.length > 140 ? '<span class="toggle" data-idx="'+i+'">더 보기</span>' : ''}
        </td>
      </tr>
    `).join('');

    tbody.querySelectorAll('.toggle').forEach(el => {
      el.addEventListener('click', () => {
        const idx = el.getAttribute('data-idx');
        const span = tbody.querySelector(`.desc-text[data-idx="${idx}"]`);
        span.classList.toggle('expanded');
        el.textContent = span.classList.contains('expanded') ? '접기' : '더 보기';
      });
    });
  }

  exportBtn.addEventListener('click', () => {
    if (filtered.length === 0) return;
    const cols = ['device','fileName','moduleName','name','kind','oidResolved','oidRaw','syntax','access','status','description'];
    const header = ['Device','File','Module','Name','Kind','OID','OID (raw)','Syntax','Access','Status','Description'];
    const rows = [header].concat(filtered.map(e => cols.map(c => {
      let v = e[c] == null ? '' : String(e[c]);
      v = v.replace(/"/g,'""');
      return `"${v}"`;
    })));
    const csv = '\uFEFF' + rows.map(r => r.join(',')).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mib-objects.csv';
    a.click();
    URL.revokeObjectURL(url);
  });

})();
</script>
